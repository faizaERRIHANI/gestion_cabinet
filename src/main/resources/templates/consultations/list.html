<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Consultations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Liste des Consultations</h2>
    <a href="/consultations/new" class="btn btn-primary mb-3">➕ Ajouter une consultation</a>

    <table class="table table-bordered table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Diagnostic</th>
            <th>Patient</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${consultations}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.dateConsultation}"></td>
            <td th:text="${c.diagnostic}"></td>
            <td th:text="${c.patient.nom + ' ' + c.patient.prenom}"></td>
            <td>
                <a th:href="@{/consultations/delete/{id}(id=${c.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Confirmer la suppression ?')">
                    🗑 Supprimer
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
