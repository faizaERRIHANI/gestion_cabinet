<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Consultation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Ajouter une Consultation</h2>

    <form action="/consultations/save" method="post" style="max-width: 500px;">
        <div class="mb-3">
            <label class="form-label">Date :</label>
            <input type="date" name="dateConsultation" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Diagnostic :</label>
            <textarea name="diagnostic" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Patient :</label>
            <select name="patient.id" class="form-select" required>
                <option value="">-- Choisir un patient --</option>
                <option th:each="p : ${patients}"
                        th:value="${p.id}"
                        th:text="${p.nom + ' ' + p.prenom}">
                </option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">💾 Enregistrer</button>
        <a href="/consultations" class="btn btn-secondary">Annuler</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
